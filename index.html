<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>極東數位木作工程</title>
<style>
  :root {
    --bg-color: #F9F7F2;      /* 極簡米白底色 */
    --text-color: #4A4A4A;    /* 深灰字體 */
    --accent-color: #8A9A8B;  /* 柔和灰綠色 */
    --gold: #C9954A;
  }
  body { 
    font-family: "Noto Sans TC", sans-serif; 
    background: var(--bg-color); 
    color: var(--text-color);
    line-height: 1.6;
    margin: 0;
  }
  nav { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
  .logo { font-weight: bold; font-size: 1.2rem; color: var(--text-color); }
  .hero { padding: 100px 40px; text-align: center; }
  .sec-title { font-size: 2.5rem; margin-bottom: 40px; }
  .sec-title span { color: var(--accent-color); }
  .svc-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 0 40px; }
  .svc-card { background: #fff; padding: 30px; border: 1px solid #eee; }
  .svc-name { font-weight: bold; margin-bottom: 10px; color: var(--accent-color); }
  .contact { padding: 80px 40px; background: #fff; }
  .field { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; background: #fdfdfd; }
  .form-submit { width: 100%; padding: 15px; background: var(--accent-color); color: white; border: none; cursor: pointer; }
</style>
</head>
<body>

<nav>
  <div class="logo">極東數位木作工程</div>
  <div>
    <a href="#services">服務</a> | <a href="#contact">聯絡</a>
  </div>
</nav>

<section class="hero">
  <h1>極東數位木作工程</h1>
  <p>20 年 CNC 技術累積，從拆圖到切割一站式服務，協助您精準實現各式曲面空間設計。</p>
  <a href="#contact" style="padding: 15px 30px; background: var(--accent-color); color: #fff; text-decoration: none;">立即免費估價</a>
</section>

<section id="services">
  <h2 class="sec-title" style="text-align: center;">核心<span>服務項目</span></h2>
  <div class="svc-grid">
    <div class="svc-card">
      <div class="svc-name">代客拆圖 · 製圖</div>
      <p>專業 3D 建模與精準拆圖，將您的創意轉化為可立即加工的數位圖檔。</p>
    </div>
    <div class="svc-card">
      <div class="svc-name">CNC 骨架切割</div>
      <p>精密刀具切割，切面無黑邊，完美保留木作原色，適合特殊曲面製作。</p>
    </div>
    <div class="svc-card">
      <div class="svc-name">雲端配送全台</div>
      <p>線上即時報價，多產線同步運作，確保工期縮短 75%。</p>
    </div>
  </div>
</section>

<section class="contact" id="contact">
  <div style="max-width: 600px; margin: 0 auto;">
    <h2 class="sec-title" style="text-align: center;">開始合作</h2>
    <form id="woodworkingForm">
      <input class="field" type="text" name="name" placeholder="您的姓名" required>
      <input class="field" type="tel" name="phone" placeholder="聯絡電話" required>
      <textarea class="field" name="requirement" placeholder="您的需求描述" style="height: 150px;"></textarea>
      <button type="submit" id="submitBtn" class="form-submit">送出諮詢</button>
    </form>
  </div>
</section>

<script>
  const form = document.getElementById('woodworkingForm');
  const scriptURL = 'https://script.google.com/macros/s/AKfycbx_RMaKFrAV6pZNZfHRUU8kca1_oZ_HlD0riPQO1RSxJ2gX11ZaM4eIpVF9RRXz_IYm/exec';
  
  form.addEventListener('submit', e => {
    e.preventDefault();
    fetch(scriptURL, { method: 'POST', body: new FormData(form)})
      .then(() => {
        alert('已收到您的需求！');
        form.reset();
      })
      .catch(() => alert('傳送失敗，請加 LINE 聯繫。'));
  });
</script>

</body>
</html>
